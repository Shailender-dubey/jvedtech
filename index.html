    <div id="root"></div>

    <!-- Chatbox -->
    
<div id="chatbox" style="position:fixed;bottom:20px;right:20px;width:300px;background:white;padding:10px;border-radius:10px;box-shadow:0 0 10px gray;z-index:9999;">
  <div id="messages" style="height:200px;overflow:auto;margin-bottom:10px;"></div>

  <input type="text" id="userInput" placeholder="Ask me..." style="width:70%;padding:5px;">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
  let input=document.getElementById("userInput");
  let msg=input.value;

  if(msg==="") return;

  let box=document.getElementById("messages");
  box.innerHTML += "<p><b>You:</b> "+msg+"</p>";
  box.innerHTML += "<p><b>Bot:</b> Working...</p>";

  input.value="";
}
</script>
